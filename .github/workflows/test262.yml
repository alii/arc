name: test262 conformance

on:
  push:
    branches: [master]
    # GitHub evaluates these against the whole push range (before..after), so a
    # multi-commit push whose tip is e.g. a submodule bump still runs when an
    # earlier commit touched src/.
    #
    # pass.txt is listed so a hand-rebaseline gets re-verified. The bot's own
    # "Update test262 conformance" commit also touches it, but pushes made with
    # the default GITHUB_TOKEN never trigger `push` workflows, so no loop.
    paths:
      - 'src/**'
      - 'test/**'
      - 'gleam.toml'
      - 'manifest.toml'
      - 'vendor/**'
      - '.github/test262/pass.txt'
      - '.github/scripts/**'
      - '.github/workflows/test262.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  # The full suite is ~2 CPU-hours (~30 min on one 4-vCPU runner), so it is
  # fanned out across parallel jobs. Each shard runs a disjoint slice of the
  # test files (TEST262_SHARD hash-partitions them) on its own runner, with
  # exactly the same per-machine worker count and memory profile as a single
  # full run, and uploads the pass list + result counts for its slice.
  shard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The shard count (8) is written out in three places that must agree:
      # this list, the /8 in TEST262_SHARD below, and the count check in the
      # merge job. Every mismatch fails loudly (the runner rejects k >= n; the
      # merge job counts its inputs). The denominator is deliberately NOT
      # strategy.job-total: that context tracks the jobs in the current
      # attempt, so a "re-run failed jobs" of a subset would silently change
      # the partition.
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '29'
          gleam-version: '1.17'
          rebar3-version: '3'

      - name: Build
        run: gleam deps download

      - name: Run test262 shard
        # UPDATE_SNAPSHOT=1 makes the runner write the set of tests that pass
        # in this shard's slice to .github/test262/pass.txt instead of failing
        # on snapshot mismatches. Real unit-test failures still fail the job.
        # The merge job reassembles the full set and turns snapshot
        # *regressions* back into a failure.
        run: |
          TEST262_EXEC=1 UPDATE_SNAPSHOT=1 TEST262_SHARD='${{ matrix.shard }}/8' RESULTS_FILE='results-${{ matrix.shard }}.json' gleam test
          cp .github/test262/pass.txt 'pass-${{ matrix.shard }}.txt'
        timeout-minutes: 30

      - uses: actions/upload-artifact@v4
        with:
          name: test262-shard-${{ matrix.shard }}
          path: |
            pass-${{ matrix.shard }}.txt
            results-${{ matrix.shard }}.json
          retention-days: 1
          if-no-files-found: error
          # Lets "Re-run all jobs" replace the previous attempt's artifact
          # instead of failing with a name conflict.
          overwrite: true

  merge:
    needs: shard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/download-artifact@v4
        with:
          pattern: test262-shard-*
          merge-multiple: true
          path: /tmp/shards

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install matplotlib

      - name: Reassemble pass.txt and results.json
        # The shards' slices are disjoint, and each shard writes its pass list
        # byte-sorted with a trailing newline, so a byte-order merge of all of
        # them is exactly the pass.txt a single full run would have written.
        # (sed drops the blank line a shard with zero passes would contribute.)
        run: |
          set -o pipefail
          n_pass=$(ls /tmp/shards/pass-*.txt | wc -l)
          n_results=$(ls /tmp/shards/results-*.json | wc -l)
          # 8 = the number of entries in jobs.shard.strategy.matrix.shard.
          if [ "$n_pass" -ne 8 ] || [ "$n_results" -ne 8 ]; then
            echo "::error::expected 8 shard pass lists and results files, got $n_pass and $n_results"
            exit 1
          fi
          LC_ALL=C sort -u /tmp/shards/pass-*.txt | sed '/^$/d' > .github/test262/pass.txt
          python3 .github/scripts/merge_results.py .github/test262/results.json /tmp/shards/results-*.json

      - name: Guard against test262 regressions
        # The step above rewrote pass.txt. Added lines = new passing tests
        # (fine — we'll commit them). A removed line = a test that used to pass
        # and now fails: fail the job and leave pass.txt untouched.
        #
        # Exception: a test262 bump can delete/rename tests upstream. A removed
        # pass.txt line whose file no longer exists is not a regression — let it
        # fall out of the snapshot instead of failing every run after a bump.
        run: |
          # Sanity: the exemption below keys on file existence, so an absent or
          # empty test262 checkout must never be mistaken for "everything was
          # removed upstream" (that would let a gutted pass.txt reach master).
          if [ ! -d vendor/test262/test/built-ins ]; then
            echo "::error::vendor/test262 submodule is missing — refusing to evaluate pass.txt"
            exit 1
          fi
          git diff -- .github/test262/pass.txt > /tmp/pass-txt.diff
          if [ ! -s /tmp/pass-txt.diff ]; then
            echo "No change to pass.txt"
            exit 0
          fi
          grep -E '^-[^-]' /tmp/pass-txt.diff | sed 's/^-//' > /tmp/removed.txt
          removed_count=$(wc -l < /tmp/removed.txt)
          if [ "$removed_count" -gt 500 ]; then
            echo "::error::$removed_count tests dropped out of pass.txt in one run — too many to be plausible; investigate manually"
            git checkout -- .github/test262/pass.txt
            exit 1
          fi
          while IFS= read -r t; do
            if [ -f "vendor/test262/test/$t" ]; then
              printf '%s\n' "$t"
            else
              echo "removed upstream: $t" >&2
            fi
          done < /tmp/removed.txt > /tmp/regressions.txt
          if [ -s /tmp/regressions.txt ]; then
            echo "::error::test262 regression — previously-passing test(s) now fail; pass.txt left unchanged"
            cat /tmp/regressions.txt
            git checkout -- .github/test262/pass.txt
            exit 1
          fi
          echo "pass.txt changes (new passes and/or tests removed upstream):"
          git diff --stat -- .github/test262/pass.txt

      - name: Generate conformance chart
        run: |
          python3 .github/scripts/generate_chart.py --add-result .github/test262/results.json

      - name: Commit results
        run: |
          git config user.name "alistair-bot"
          git config user.email "alistair-bot@users.noreply.github.com"
          git add .github/test262/history.json .github/test262/conformance.png .github/test262/conformance-dark.png .github/test262/pass.txt
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update test262 conformance: $(python3 -c "
          import json
          with open('.github/test262/results.json') as f:
              r = json.load(f)
          print(f\"{r['percent']}% ({r['pass']}/{r['tested']})\")
          ")"
            git pull --rebase origin master
            git push
          fi
