name: test262 conformance

on:
  push:
    branches: [master]
    # GitHub evaluates these against the whole push range (before..after), so a
    # multi-commit push whose tip is e.g. a submodule bump still runs when an
    # earlier commit touched src/.
    #
    # pass.txt is listed so a hand-rebaseline gets re-verified. The bot's own
    # "Update test262 conformance" commit also touches it, but pushes made with
    # the default GITHUB_TOKEN never trigger `push` workflows, so no loop.
    paths:
      - 'src/**'
      - 'test/**'
      - 'gleam.toml'
      - 'manifest.toml'
      - 'vendor/**'
      - '.github/test262/pass.txt'
      - '.github/scripts/**'
      - '.github/workflows/test262.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  test262:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '29'
          gleam-version: '1.17'
          rebar3-version: '3'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install matplotlib

      - name: Build
        run: gleam deps download

      - name: Run test262 suite
        # UPDATE_SNAPSHOT=1 rewrites pass.txt to exactly the tests passing now,
        # in a single run, and never fails the build on a snapshot mismatch.
        # Real unit-test failures still fail the build. We turn snapshot
        # *regressions* back into a failure in the next step (a removed line in
        # pass.txt), so the only thing this lets through automatically is new
        # passes — which is the whole point.
        run: |
          TEST262_EXEC=1 UPDATE_SNAPSHOT=1 RESULTS_FILE=.github/test262/results.json gleam test
        timeout-minutes: 60

      - name: Guard against test262 regressions
        # The suite above rewrote pass.txt. Added lines = new passing tests
        # (fine — we'll commit them). A removed line = a test that used to pass
        # and now fails: fail the job and leave pass.txt untouched.
        #
        # Exception: a test262 bump can delete/rename tests upstream. A removed
        # pass.txt line whose file no longer exists is not a regression — let it
        # fall out of the snapshot instead of failing every run after a bump.
        run: |
          # Sanity: the exemption below keys on file existence, so an absent or
          # empty test262 checkout must never be mistaken for "everything was
          # removed upstream" (that would let a gutted pass.txt reach master).
          if [ ! -d vendor/test262/test/built-ins ]; then
            echo "::error::vendor/test262 submodule is missing — refusing to evaluate pass.txt"
            exit 1
          fi
          git diff -- .github/test262/pass.txt > /tmp/pass-txt.diff
          if [ ! -s /tmp/pass-txt.diff ]; then
            echo "No change to pass.txt"
            exit 0
          fi
          grep -E '^-[^-]' /tmp/pass-txt.diff | sed 's/^-//' > /tmp/removed.txt
          removed_count=$(wc -l < /tmp/removed.txt)
          if [ "$removed_count" -gt 500 ]; then
            echo "::error::$removed_count tests dropped out of pass.txt in one run — too many to be plausible; investigate manually"
            git checkout -- .github/test262/pass.txt
            exit 1
          fi
          while IFS= read -r t; do
            if [ -f "vendor/test262/test/$t" ]; then
              printf '%s\n' "$t"
            else
              echo "removed upstream: $t" >&2
            fi
          done < /tmp/removed.txt > /tmp/regressions.txt
          if [ -s /tmp/regressions.txt ]; then
            echo "::error::test262 regression — previously-passing test(s) now fail; pass.txt left unchanged"
            cat /tmp/regressions.txt
            git checkout -- .github/test262/pass.txt
            exit 1
          fi
          echo "pass.txt changes (new passes and/or tests removed upstream):"
          git diff --stat -- .github/test262/pass.txt

      - name: Generate conformance chart
        run: |
          python3 .github/scripts/generate_chart.py --add-result .github/test262/results.json

      - name: Commit results
        run: |
          git config user.name "alistair-bot"
          git config user.email "alistair-bot@users.noreply.github.com"
          git add .github/test262/history.json .github/test262/conformance.png .github/test262/conformance-dark.png .github/test262/pass.txt
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update test262 conformance: $(python3 -c "
          import json
          with open('.github/test262/results.json') as f:
              r = json.load(f)
          print(f\"{r['percent']}% ({r['pass']}/{r['tested']})\")
          ")"
            git pull --rebase origin master
            git push
          fi
